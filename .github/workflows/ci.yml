name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install mypy pytest pytest-cov ruff

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src

      - name: Tests
        run: pytest --cov=netset2p2p --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Generate coverage badge files
        if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = ET.parse("coverage.xml").getroot()
          line_rate = float(root.attrib.get("line-rate", "0"))
          percent = round(line_rate * 100)

          if percent >= 90:
              color = "brightgreen"
          elif percent >= 80:
              color = "green"
          elif percent >= 70:
              color = "yellowgreen"
          elif percent >= 60:
              color = "yellow"
          else:
              color = "red"

          badge = {
              "schemaVersion": 1,
              "label": "coverage",
              "message": f"{percent}%",
              "color": color,
          }

          path = Path(".github/badges/coverage.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(badge, separators=(",", ":")) + "\n", encoding="utf-8")

          label = "coverage"
          message = f"{percent}%"
          left_width = 70
          right_width = max(38, 10 + len(message) * 7)
          total_width = left_width + right_width

          svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="{total_width}" height="20" role="img" aria-label="{label}: {message}">
<linearGradient id="b" x2="0" y2="100%">
  <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
  <stop offset="1" stop-opacity=".1"/>
</linearGradient>
<mask id="a">
  <rect width="{total_width}" height="20" rx="3" fill="#fff"/>
</mask>
<g mask="url(#a)">
  <rect width="{left_width}" height="20" fill="#555"/>
  <rect x="{left_width}" width="{right_width}" height="20" fill="{color}"/>
  <rect width="{total_width}" height="20" fill="url(#b)"/>
</g>
<g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
  <text x="{left_width / 2}" y="15" fill="#010101" fill-opacity=".3">{label}</text>
  <text x="{left_width / 2}" y="14">{label}</text>
  <text x="{left_width + right_width / 2}" y="15" fill="#010101" fill-opacity=".3">{message}</text>
  <text x="{left_width + right_width / 2}" y="14">{message}</text>
</g>
</svg>
"""

          svg_path = Path(".github/badges/coverage.svg")
          svg_path.write_text(svg, encoding="utf-8")
          PY

      - name: Commit coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json .github/badges/coverage.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore(ci): update coverage badge [skip ci]"
          git push
